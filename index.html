<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Dash Runner</title>
<style>
  :root { --sky1:#6dc3ff; --sky2:#bfe9ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background:#1a1a2e;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  #wrap {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  #game {
    display:block;
    background:linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 70%, #d8f5d0 100%);
    touch-action:none;
    box-shadow:0 0 60px rgba(0,0,0,0.5);
    max-width:100%; max-height:100%;
  }
  /* Overlays */
  .overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#fff;
    background:rgba(10,12,30,0.55);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
    padding:24px;
  }
  .hidden { display:none !important; }
  .title {
    font-size:clamp(32px, 9vw, 72px);
    font-weight:900;
    letter-spacing:1px;
    text-shadow:0 4px 0 #c0392b, 0 6px 14px rgba(0,0,0,0.4);
    color:#ffcf33;
  }
  .sub { margin-top:14px; font-size:clamp(14px,3.6vw,20px); opacity:0.95; max-width:520px; line-height:1.5; }
  .btn {
    margin-top:26px;
    padding:14px 34px;
    font-size:clamp(16px,4vw,22px);
    font-weight:800;
    color:#1a1a2e;
    background:#ffcf33;
    border:none; border-radius:999px;
    cursor:pointer;
    box-shadow:0 5px 0 #d4a017, 0 8px 16px rgba(0,0,0,0.3);
    transition:transform .06s ease, box-shadow .06s ease;
  }
  .btn:active { transform:translateY(4px); box-shadow:0 1px 0 #d4a017, 0 3px 8px rgba(0,0,0,0.3); }
  .stat { margin-top:18px; font-size:clamp(16px,4.2vw,24px); font-weight:700; }
  .stat span { color:#ffcf33; }
  .hint { margin-top:22px; font-size:13px; opacity:0.7; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="startScreen" class="overlay">
    <div class="title">DASH RUNNER</div>
    <div class="sub">You run automatically. <b>Tap / Click / Space</b> to jump — hold longer to jump higher. Stomp enemies, grab coins, don't fall in the gaps!</div>
    <button class="btn" id="startBtn">PLAY</button>
    <div class="hint">Best: <span id="bestStart">0</span> m</div>
  </div>

  <div id="overScreen" class="overlay hidden">
    <div class="title" style="color:#ff6b6b; text-shadow:0 4px 0 #7a1f1f, 0 6px 14px rgba(0,0,0,.4)">GAME OVER</div>
    <div class="stat">Distance: <span id="finalDist">0</span> m</div>
    <div class="stat">Coins: <span id="finalCoins">0</span></div>
    <div class="stat">Best: <span id="finalBest">0</span> m</div>
    <button class="btn" id="retryBtn">RETRY</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ---------- Setup ----------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // Logical resolution (game world is drawn at this size, then scaled to fit)
  const VIEW_W = 960;
  const VIEW_H = 540;

  function resize() {
    const ww = window.innerWidth, wh = window.innerHeight;
    const scale = Math.min(ww / VIEW_W, wh / VIEW_H);
    canvas.style.width = Math.floor(VIEW_W * scale) + "px";
    canvas.style.height = Math.floor(VIEW_H * scale) + "px";
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = VIEW_W * dpr;
    canvas.height = VIEW_H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---------- Constants ----------
  const GROUND_Y = 440;        // top of the ground surface
  const GRAVITY = 0.9;
  const JUMP_V = -15.5;         // initial jump velocity
  const JUMP_HOLD_BOOST = -0.62; // extra lift while holding (anti-gravity)
  const MAX_HOLD = 14;          // frames the hold boost applies
  const BASE_SPEED = 5.2;       // world scroll speed
  const SPEED_RAMP = 0.00018;   // speed increase per pixel travelled

  // ---------- Game state ----------
  let state = "start"; // start | playing | over
  let best = +(localStorage.getItem("dashRunnerBest") || 0);
  document.getElementById("bestStart").textContent = best;

  const player = {
    x: 180, y: GROUND_Y - 46, w: 36, h: 46,
    vy: 0, onGround: true,
    jumps: 0, holdFrames: 0, holding: false,
    runFrame: 0, dead: false,
  };

  let camX = 0;          // total distance scrolled (pixels)
  let speed = BASE_SPEED;
  let coins = 0;
  let platforms = [];    // {x, y, w, h}  (ground & floating)
  let gaps = [];         // {x, w} pits in the ground
  let coinItems = [];    // {x, y, taken}
  let enemies = [];      // {x, y, w, h, vy, onGround, dead, deadTimer}
  let particles = [];    // {x,y,vx,vy,life,color,size}
  let spawnX = 0;        // world-x up to which we've generated terrain

  // ---------- Input ----------
  function pressJump() {
    if (state === "start") { startGame(); return; }
    if (state === "over") { startGame(); return; }
    if (state !== "playing") return;
    if (player.jumps < 2) {            // allow a double jump
      player.vy = JUMP_V;
      player.onGround = false;
      player.jumps++;
      player.holding = true;
      player.holdFrames = 0;
      if (player.jumps === 2) {        // double-jump: little puff
        spawnParticles(player.x + player.w/2, player.y + player.h, 6, "#ffffff");
      }
    }
  }
  function releaseJump() { player.holding = false; }

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
      e.preventDefault();
      if (!e.repeat) pressJump();
    }
  });
  window.addEventListener("keyup", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") releaseJump();
  });
  canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); pressJump(); });
  canvas.addEventListener("pointerup", () => releaseJump());
  // Overlay buttons also start
  document.getElementById("startBtn").addEventListener("click", (e) => { e.stopPropagation(); startGame(); });
  document.getElementById("retryBtn").addEventListener("click", (e) => { e.stopPropagation(); startGame(); });

  // ---------- Terrain generation ----------
  // Deterministic-ish pseudo random per chunk so it feels designed
  function rand(a, b) { return a + Math.random() * (b - a); }
  function chance(p) { return Math.random() < p; }

  function generateAhead() {
    // Keep generating until terrain covers ~2 screens past the camera
    while (spawnX < camX + VIEW_W * 2) {
      const difficulty = Math.min(1, camX / 9000); // 0 -> 1 over distance

      // Decide: solid ground segment, then maybe a gap
      const segLen = rand(260, 520);
      platforms.push({ x: spawnX, y: GROUND_Y, w: segLen, h: VIEW_H - GROUND_Y, kind: "ground" });

      // Sprinkle coins along this segment (arc or line)
      if (chance(0.7)) {
        const cn = Math.floor(rand(3, 7));
        const cy = chance(0.5) ? GROUND_Y - 40 : GROUND_Y - 120;
        const cx0 = spawnX + rand(40, 120);
        const arc = chance(0.5);
        for (let i = 0; i < cn; i++) {
          const cx = cx0 + i * 42;
          if (cx > spawnX + segLen - 30) break;
          const yy = arc ? cy - Math.sin((i / (cn - 1)) * Math.PI) * 70 : cy;
          coinItems.push({ x: cx, y: yy, taken: false, bob: Math.random() * Math.PI * 2 });
        }
      }

      // Floating platform with reward
      if (chance(0.45)) {
        const pw = rand(90, 170);
        const px = spawnX + rand(60, segLen - pw - 40);
        const py = GROUND_Y - rand(110, 180);
        if (px > spawnX && px + pw < spawnX + segLen) {
          platforms.push({ x: px, y: py, w: pw, h: 18, kind: "float" });
          const cn = Math.floor(pw / 42);
          for (let i = 0; i < cn; i++) {
            coinItems.push({ x: px + 20 + i * 42, y: py - 34, taken: false, bob: Math.random() * Math.PI * 2 });
          }
        }
      }

      // Enemy on the ground
      if (chance(0.35 + difficulty * 0.3)) {
        const ex = spawnX + rand(140, segLen - 80);
        enemies.push({ x: ex, y: GROUND_Y - 34, w: 34, h: 34, vy: 0, onGround: true, dead: false, deadTimer: 0, dir: -1, walk: Math.random()*6 });
      }

      spawnX += segLen;

      // Gap (pit) after the segment — wider as difficulty rises
      if (camX > 600 && chance(0.55)) {
        const gapW = rand(70, 90 + difficulty * 120);
        gaps.push({ x: spawnX, w: gapW });
        spawnX += gapW;
      }
    }
  }

  function groundAt(worldX) {
    // returns the y of solid ground at worldX, or null if it's a gap
    for (const g of gaps) {
      if (worldX >= g.x && worldX <= g.x + g.w) return null;
    }
    return GROUND_Y;
  }

  // ---------- Particles ----------
  function spawnParticles(x, y, n, color) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y,
        vx: rand(-3, 3), vy: rand(-5, -1),
        life: rand(18, 32), color, size: rand(2, 5),
      });
    }
  }

  // ---------- Game flow ----------
  function startGame() {
    state = "playing";
    camX = 0; speed = BASE_SPEED; coins = 0; spawnX = 0;
    platforms = []; gaps = []; coinItems = []; enemies = []; particles = [];
    player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
    player.jumps = 0; player.holding = false; player.dead = false; player.runFrame = 0;
    generateAhead();
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("overScreen").classList.add("hidden");
  }

  function gameOver() {
    if (state !== "playing") return;
    state = "over";
    player.dead = true;
    const dist = Math.floor(camX / 10);
    if (dist > best) { best = dist; localStorage.setItem("dashRunnerBest", best); }
    document.getElementById("finalDist").textContent = dist;
    document.getElementById("finalCoins").textContent = coins;
    document.getElementById("finalBest").textContent = best;
    document.getElementById("overScreen").classList.remove("hidden");
    spawnParticles(player.x + player.w/2, player.y + player.h/2, 24, "#ff6b6b");
  }

  // ---------- Collision helper ----------
  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // ---------- Update ----------
  function update() {
    if (state !== "playing") {
      // still animate particles on the game-over screen
      updateParticles();
      return;
    }

    speed = BASE_SPEED + camX * SPEED_RAMP;
    camX += speed;
    player.runFrame += speed * 0.08;
    generateAhead();
    cullOffscreen();

    // ---- Player vertical physics ----
    if (player.holding && player.holdFrames < MAX_HOLD && player.vy < 0) {
      player.vy += JUMP_HOLD_BOOST;
      player.holdFrames++;
    }
    player.vy += GRAVITY;
    player.y += player.vy;

    // Landing on solid surfaces (ground segments + floating platforms)
    const px = camX + player.x;        // player world-x (left)
    const pcx = px + player.w / 2;     // player center world-x
    player.onGround = false;

    // Ground
    const gy = groundAt(pcx);
    if (gy !== null && player.vy >= 0 && player.y + player.h >= gy && player.y + player.h <= gy + 28) {
      player.y = gy - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumps = 0;
    }

    // Floating platforms (land on top only)
    for (const p of platforms) {
      if (p.kind !== "float") continue;
      const pworld = { x: p.x, y: p.y, w: p.w, h: p.h };
      const feetPrev = player.y + player.h - player.vy;
      if (player.vy >= 0 &&
          px + player.w > pworld.x && px < pworld.x + pworld.w &&
          feetPrev <= pworld.y + 4 && player.y + player.h >= pworld.y) {
        player.y = pworld.y - player.h;
        player.vy = 0;
        player.onGround = true;
        player.jumps = 0;
      }
    }

    if (player.onGround) player.jumps = 0;

    // Fell into a gap / off the bottom
    if (player.y > VIEW_H + 40) { gameOver(); return; }

    // ---- Coins ----
    const pBox = { x: px, y: player.y, w: player.w, h: player.h };
    for (const c of coinItems) {
      if (c.taken) continue;
      if (rectsOverlap(pBox, { x: c.x - 12, y: c.y - 12, w: 24, h: 24 })) {
        c.taken = true; coins++;
        spawnParticles(c.x, c.y, 8, "#ffd84d");
      }
    }

    // ---- Enemies ----
    for (const e of enemies) {
      if (e.dead) { e.deadTimer++; continue; }
      // simple gravity + patrol
      e.walk += 0.15;
      const eBox = { x: e.x, y: e.y, w: e.w, h: e.h };
      if (rectsOverlap(pBox, eBox)) {
        const feet = player.y + player.h;
        if (player.vy > 0 && feet - player.vy <= e.y + 10) {
          // stomp!
          e.dead = true; e.deadTimer = 0;
          player.vy = JUMP_V * 0.7;   // bounce
          player.jumps = 1;
          coins += 1;
          spawnParticles(e.x + e.w/2, e.y, 10, "#7cffb2");
        } else {
          gameOver(); return;
        }
      }
    }

    updateParticles();
  }

  function updateParticles() {
    for (const pt of particles) {
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.3; pt.life--;
    }
    particles = particles.filter(pt => pt.life > 0);
  }

  function cullOffscreen() {
    const minX = camX - 200;
    platforms = platforms.filter(p => p.x + p.w > minX);
    gaps = gaps.filter(g => g.x + g.w > minX);
    coinItems = coinItems.filter(c => !c.taken && c.x > minX || (c.x > minX));
    coinItems = coinItems.filter(c => c.x > minX);
    enemies = enemies.filter(e => e.x > minX && e.deadTimer < 40);
  }

  // ---------- Rendering ----------
  function drawBackground() {
    // distant hills (parallax)
    ctx.save();
    const hillColor = ["#9fd8a0", "#86c98a"];
    for (let layer = 0; layer < 2; layer++) {
      const par = layer === 0 ? 0.2 : 0.45;
      const off = (camX * par) % 320;
      ctx.fillStyle = hillColor[layer];
      const baseY = layer === 0 ? GROUND_Y - 20 : GROUND_Y + 10;
      for (let i = -1; i < VIEW_W / 320 + 2; i++) {
        const hx = i * 320 - off;
        ctx.beginPath();
        ctx.arc(hx + 160, baseY + 80, 150, Math.PI, 0);
        ctx.fill();
      }
    }
    // clouds
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    const coff = (camX * 0.12) % 480;
    for (let i = -1; i < VIEW_W / 480 + 2; i++) {
      const cx = i * 480 - coff + 80;
      cloud(cx, 90); cloud(cx + 240, 150);
    }
    ctx.restore();
  }
  function cloud(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 24, 0, Math.PI*2);
    ctx.arc(x + 28, y + 6, 30, 0, Math.PI*2);
    ctx.arc(x + 62, y, 22, 0, Math.PI*2);
    ctx.fill();
  }

  function drawGround() {
    for (const p of platforms) {
      const sx = p.x - camX;
      if (sx > VIEW_W || sx + p.w < 0) continue;
      if (p.kind === "ground") {
        // grass top
        ctx.fillStyle = "#5fae3a";
        ctx.fillRect(sx, p.y, p.w, 14);
        // dirt
        ctx.fillStyle = "#a9703f";
        ctx.fillRect(sx, p.y + 14, p.w, p.h - 14);
        // dirt texture
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        for (let i = 0; i < p.w; i += 36) {
          ctx.fillRect(sx + i + (Math.floor((p.x)/36)%2?18:0), p.y + 28, 8, 8);
        }
      } else {
        // floating brick platform
        ctx.fillStyle = "#c97b3c";
        roundRect(sx, p.y, p.w, p.h, 6); ctx.fill();
        ctx.fillStyle = "#e29a5c";
        ctx.fillRect(sx + 4, p.y + 3, p.w - 8, 4);
      }
    }
  }

  function drawCoins() {
    for (const c of coinItems) {
      if (c.taken) continue;
      const sx = c.x - camX;
      if (sx < -20 || sx > VIEW_W + 20) continue;
      const bob = Math.sin(c.bob + performance.now() / 300) * 4;
      const cy = c.y + bob;
      // shimmer width
      const w = 9 + Math.sin(performance.now()/150 + c.bob) * 5;
      ctx.fillStyle = "#ffd84d";
      ctx.beginPath();
      ctx.ellipse(sx, cy, Math.max(3, Math.abs(w)), 12, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = "#d4a017"; ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  function drawEnemies() {
    for (const e of enemies) {
      const sx = e.x - camX;
      if (sx < -40 || sx > VIEW_W + 40) continue;
      if (e.dead) {
        // squashed
        ctx.fillStyle = "#8a5a2b";
        ctx.fillRect(sx, e.y + e.h - 10, e.w, 10);
        continue;
      }
      const wob = Math.sin(e.walk) * 2;
      // body
      ctx.fillStyle = "#9b4d2e";
      roundRect(sx, e.y + wob, e.w, e.h - wob, 8); ctx.fill();
      // feet
      ctx.fillStyle = "#5e2f1a";
      ctx.fillRect(sx + 2, e.y + e.h - 6, 12, 6);
      ctx.fillRect(sx + e.w - 14, e.y + e.h - 6, 12, 6);
      // eyes
      ctx.fillStyle = "#fff";
      ctx.fillRect(sx + 6, e.y + 8 + wob, 8, 9);
      ctx.fillRect(sx + e.w - 14, e.y + 8 + wob, 8, 9);
      ctx.fillStyle = "#111";
      ctx.fillRect(sx + 8, e.y + 11 + wob, 4, 5);
      ctx.fillRect(sx + e.w - 12, e.y + 11 + wob, 4, 5);
    }
  }

  function drawPlayer() {
    const x = player.x, y = player.y, w = player.w, h = player.h;
    ctx.save();
    // shadow
    const gy = groundAt(camX + x + w/2);
    if (gy !== null) {
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath();
      ctx.ellipse(x + w/2, gy - 2, w/2, 6, 0, 0, Math.PI*2);
      ctx.fill();
    }

    const squashing = !player.onGround;
    // body (overalls)
    ctx.fillStyle = "#2e6fd4";
    roundRect(x, y + 16, w, h - 16, 6); ctx.fill();
    // shirt
    ctx.fillStyle = "#e23b3b";
    roundRect(x, y + 8, w, 16, 6); ctx.fill();
    // head
    ctx.fillStyle = "#f4c89a";
    roundRect(x + 6, y - 4, w - 12, 18, 6); ctx.fill();
    // cap
    ctx.fillStyle = "#e23b3b";
    roundRect(x + 4, y - 8, w - 8, 9, 4); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillRect(x + w/2 - 3, y - 5, 6, 4);
    // eye
    ctx.fillStyle = "#222";
    ctx.fillRect(x + w - 14, y + 2, 4, 5);

    // legs animate when running on ground
    ctx.fillStyle = "#3a2a16";
    if (player.onGround) {
      const phase = Math.sin(player.runFrame);
      ctx.fillRect(x + 4, y + h - 6 + phase * 2, 12, 6);
      ctx.fillRect(x + w - 16, y + h - 6 - phase * 2, 12, 6);
    } else {
      // tucked legs when jumping
      ctx.fillRect(x + 6, y + h - 8, 12, 6);
      ctx.fillRect(x + w - 18, y + h - 8, 12, 6);
    }
    ctx.restore();
  }

  function drawParticles() {
    for (const pt of particles) {
      ctx.globalAlpha = Math.max(0, pt.life / 32);
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    ctx.save();
    ctx.font = "bold 26px system-ui, sans-serif";
    ctx.textBaseline = "top";
    // distance
    const dist = Math.floor(camX / 10);
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillText(dist + " m", 22, 21);
    ctx.fillStyle = "#fff";
    ctx.fillText(dist + " m", 20, 19);
    // coins
    ctx.fillStyle = "#ffd84d";
    ctx.beginPath(); ctx.ellipse(VIEW_W - 150, 32, 9, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#d4a017"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.fillText("× " + coins, VIEW_W - 132, 19);
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function render() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    drawBackground();
    drawGround();
    drawCoins();
    drawEnemies();
    drawParticles();
    if (state !== "start") drawPlayer();
    drawHUD();
  }

  // ---------- Main loop ----------
  let last = performance.now();
  function loop(now) {
    // fixed-ish timestep with a clamp so tab-switches don't explode physics
    let steps = Math.min(3, Math.round((now - last) / 16.67)) || 1;
    last = now;
    for (let i = 0; i < steps; i++) update();
    render();
    requestAnimationFrame(loop);
  }
  // initial demo terrain so the start screen has scenery
  generateAhead();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
